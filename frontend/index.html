<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Study Planner | Premium Scheduling</title>
  <link rel="stylesheet" href="./css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
  <button id="theme-toggle-btn" style="position: absolute; top: 20px; right: 20px; z-index: 100; font-size: 1.5rem; background: transparent; border: none; cursor: pointer; color: var(--text-main); transition: transform 0.2s;">🌙</button>
  <main class="landing-container">
    <div class="glass-box landing-box">
      <div class="brand">
        <h1>PrepWise</h1>
        <p class="subtitle">AI-Powered Study Planner</p>
      </div>

      <div class="auth-toggle">
        <button id="show-login" class="active">Login</button>
        <button id="show-register">Register</button>
      </div>

      <!-- Login Form -->
      <form id="login-form" class="auth-form">
        <div class="input-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" required placeholder="you@example.com">
        </div>
        <div class="input-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary">Sign In</button>
        <div id="login-error" class="error-msg"></div>
      </form>

      <!-- Register Form -->
      <form id="register-form" class="auth-form hidden">
        <div class="input-group">
          <label for="register-name">Name</label>
          <input type="text" id="register-name" required placeholder="John Doe">
        </div>
        <div class="input-group">
          <label for="register-email">Email</label>
          <input type="email" id="register-email" required placeholder="you@example.com">
        </div>
        <div class="input-group">
          <label for="register-password">Password</label>
          <input type="password" id="register-password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary">Create Account</button>
        <div id="register-error" class="error-msg"></div>
      </form>
    </div>
  </main>

  <!-- Glowing background elements -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <script src="./js/theme.js"></script>
  <script src="./js/api.js"></script>
  <script src="./js/auth.js"></script>
</body>
</html>
